<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stillus Multimáquinas | Premium Engineering & Products</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --brand-orange: #D37B42;
            --brand-dark: #080808;
            --fill-width: 0%;
        }

        body {
            background-color: #080808;
            color: #F8F8F8;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* TEXTURA NOISE OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.03; z-index: 9998; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        h1, h2 { font-weight: 900; letter-spacing: -0.05em; text-transform: uppercase; line-height: 0.9; }

        .animated-stroke {
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2);
            position: relative; display: inline-block;
        }

        .animated-stroke::after {
            content: "LUCRO ZERO.";
            position: absolute; left: 0; top: 0; width: var(--fill-width); height: 100%;
            color: var(--brand-orange); -webkit-text-stroke: 1px var(--brand-orange);
            overflow: hidden; white-space: nowrap; filter: drop-shadow(0 0 12px rgba(211, 123, 66, 0.6));
            transition: width 0.1s ease-out;
        }

        .hero-text-block {
            max-width: 600px; position: absolute; left: 10%; opacity: 0;
            filter: blur(10px); transform: translateY(40px);
            transition: opacity 1s ease, transform 1s ease, filter 1s ease;
            pointer-events: none; z-index: 20; will-change: transform, opacity;
        }

        .hero-text-block.active { opacity: 1; filter: blur(0px); transform: translateY(0); pointer-events: auto; }

        #hero-canvas {
            filter: brightness(0.55); width: 100%; height: 100%; object-fit: cover;
            transform: translateZ(0); will-change: transform, filter;
        }

        #produtos {
            position: relative; z-index: 40; margin-top: -100vh; padding-top: 25vh;
            background: linear-gradient(to bottom, transparent, #080808 15%, #080808 100%);
            backdrop-filter: blur(15px);
        }

        .product-card { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .product-card.revealed { opacity: 1; transform: translateY(0); }

        #loader { position: fixed; inset: 0; background: #080808; z-index: 9999; display: flex; justify-content: center; align-items: center; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body class="antialiased">

    <div id="loader">
        <div style="width: 40px; height: 40px; border-top: 2px solid #D37B42; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <nav class="fixed top-0 w-full z-50 px-6 py-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-premium px-8 py-4 rounded-full">
            <span class="text-xs font-black uppercase italic">Stillus <span style="color: #D37B42;">Multi</span></span>
        </div>
    </nav>

    <section id="scroll-hero" style="height:800vh; position:relative;">
        <div style="position:sticky; top:0; height:100vh; width:100%; overflow:hidden;">
            <canvas id="hero-canvas"></canvas>

            <div id="copy-1" class="hero-text-block top-[30%]" data-speed="0.25">
                <h1 class="text-6xl md:text-8xl mb-8">MÁQUINAS <br> PARADAS, <br> <span class="animated-stroke">LUCRO ZERO.</span></h1>
                <p class="text-lg text-white/40 border-l border-[#D37B42] pl-6">Proteja sua margem hoje.</p>
            </div>

            <div id="copy-2" class="hero-text-block top-[35%]" data-speed="0.2">
                <h2 class="text-5xl md:text-7xl mb-8">ENGENHARIA <br> DE <span style="color: #D37B42;">ELITE.</span></h2>
                <p class="text-lg text-white/50">Manutenção especializada com diagnóstico avançado.</p>
            </div>

            <div id="copy-3" class="hero-text-block top-[28%]" data-speed="0.15">
                <h2 class="text-6xl md:text-8xl mb-8">MÁXIMA <br> <span style="color: #D37B42;">EFICIÊNCIA.</span></h2>
                <p class="text-lg text-white/40 mb-10">Máquinas e peças selecionadas para máximo desempenho no seu trabalho</p>
                <button style="background: linear-gradient(135deg, #D37B42, #B58D67);" class="text-white px-10 py-5 rounded-full font-bold uppercase text-[10px] tracking-[0.3em]">Ver Catálogo</button>
            </div>
        </div>
    </section>

    <section id="produtos" class="py-32 px-[8%]">
        <div class="max-w-7xl mx-auto text-center">
            <h2 class="text-5xl text-white font-black italic mb-24">METAL & POWER.</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="product-card glass-premium p-8 rounded-3xl h-64 bg-white/5"></div>
                <div class="product-card glass-premium p-8 rounded-3xl h-64 bg-white/5"></div>
                <div class="product-card glass-premium p-8 rounded-3xl h-64 bg-white/5"></div>
            </div>
        </div>
    </section>

    <script>
        {
            const state = {
                baseUrl: "heroframe/ezgif-frame-",
                frameCount: 88, // Ajustado para 88 frames conforme solicitado
                images: [],
                loadedCount: 0
            };

            let currentFraction = 0;
            let targetFraction = 0;
            const lerpFactor = 0.2;

            window.addEventListener('load', () => {
                if(window.lucide) lucide.createIcons();
                const canvas = document.getElementById('hero-canvas');
                const ctx = canvas.getContext('2d');
                const heroSection = document.getElementById('scroll-hero');
                const loader = document.getElementById('loader');

                function updateCanvas(fraction) {
                    const videoProgress = Math.min(1, fraction / 0.8);
                    const index = Math.min(state.frameCount - 1, Math.floor(videoProgress * (state.frameCount - 1)));
                    
                    const img = state.images[index];
                    if (!img || !img.complete) return;

                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    const ratio = Math.max(canvas.width / img.width, canvas.height / img.height);
                    const sw = img.width * ratio, sh = img.height * ratio;
                    ctx.drawImage(img, (canvas.width - sw) / 2, (canvas.height - sh) / 2, sw, sh);

                    if (fraction > 0.85) {
                        const zp = (fraction - 0.85) / 0.15;
                        canvas.style.transform = `scale(${1 - (zp * 0.1)})`;
                        canvas.style.filter = `brightness(${0.55 - (zp * 0.3)}) blur(${zp * 15}px)`;
                    } else {
                        canvas.style.transform = `scale(1)`;
                        canvas.style.filter = `brightness(0.55) blur(0px)`;
                    }
                }

                function applyParallax(fraction) {
                    const blocks = [
                        { id: 'copy-1', start: 0.05, end: 0.25 },
                        { id: 'copy-2', start: 0.35, end: 0.60 },
                        { id: 'copy-3', start: 0.70, end: 0.95 }
                    ];

                    blocks.forEach(block => {
                        const el = document.getElementById(block.id);
                        if (!el) return;
                        if (fraction >= block.start && fraction <= block.end) {
                            el.classList.add('active');
                            const moveY = (fraction - block.start) * (window.innerHeight * 0.5);
                            el.style.transform = `translateY(${-moveY}px)`;
                            if(block.id === 'copy-1') {
                                const fill = Math.min(100, ((fraction - block.start) / 0.12) * 100);
                                document.documentElement.style.setProperty('--fill-width', `${fill}%`);
                            }
                        } else {
                            el.classList.remove('active');
                        }
                    });

                    document.querySelectorAll('.product-card').forEach((card, i) => {
                        if (card.getBoundingClientRect().top < window.innerHeight * 0.85) {
                            setTimeout(() => card.classList.add('revealed'), i * 100);
                        }
                    });
                }

                function renderLoop() {
                    currentFraction += (targetFraction - currentFraction) * lerpFactor;
                    updateCanvas(currentFraction);
                    applyParallax(currentFraction);
                    requestAnimationFrame(renderLoop);
                }

                for (let i = 1; i <= state.frameCount; i++) {
                    const img = new Image();
                    img.src = `${state.baseUrl}${i.toString().padStart(3, '0')}.jpg`;
                    img.onload = () => {
                        state.loadedCount++;
                        if (state.loadedCount === state.frameCount) {
                            loader.style.opacity = '0';
                            setTimeout(() => { loader.style.display = 'none'; renderLoop(); }, 500);
                        }
                    };
                    state.images.push(img);
                }

                window.addEventListener('scroll', () => {
                    targetFraction = window.scrollY / (heroSection.offsetHeight - window.innerHeight);
                }, { passive: true });
            });
        }
    </script>
</body>
</html>
