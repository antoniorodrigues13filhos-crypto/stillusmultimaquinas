<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Trator Cortador de Grama Toyama 19.5HP. Potência bruta, economia de tempo e durabilidade para grandes áreas. Garanta sua unidade com preço de fábrica.">
    <title>Trator Cortador Toyama 19.5HP | Oferta de Fábrica - Stillus</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --brand-orange: #D37B42;
            --brand-dark: #080808;
            --danger-red: #cc0000;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        html { scroll-behavior: smooth; background-color: #080808; }

        body {
            background-color: #080808;
            color: #F8F8F8;
            font-family: 'DM Sans', sans-serif;
            -webkit-overflow-scrolling: touch;
            overflow-x: hidden; 
            padding-bottom: 80px; 
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.03; z-index: -1; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .title-bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; line-height: 1.05; padding-bottom: 0.05em; }
        
        .st-reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); will-change: opacity, transform; }
        .st-reveal.loaded { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.1s; } .delay-2 { transition-delay: 0.2s; } .delay-3 { transition-delay: 0.3s; }

        .glass-card-product {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.4) 100%);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .urgency-banner { background: linear-gradient(90deg, #1a0000, var(--danger-red), #1a0000); background-size: 200% 100%; animation: pulse-banner 3s linear infinite; }
        @keyframes pulse-banner { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

        .btn-whatsapp-giant {
            display: inline-flex; align-items: center; justify-content: center; gap: 12px;
            background: linear-gradient(135deg, #25D366, #128C7E); color: #fff;
            padding: 20px 36px; border-radius: 100px;
            font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
        }
        .btn-whatsapp-giant:hover { transform: translateY(-3px) scale(1.02); }

        .product-img-main { position: relative; z-index: 1; max-width: 100%; max-height: 55vh; object-fit: contain; filter: drop-shadow(0 30px 40px rgba(0,0,0,0.8)); transition: transform 0.4s ease; }
        
        @media (max-width: 1024px) {
            .hero-grid { grid-template-columns: 1fr; gap: 32px; }
            .product-img-main { max-height: 35vh; }
        }
    </style>
</head>
<body class="antialiased">

    <div class="urgency-banner py-2 px-4 text-center z-50 relative st-reveal">
        <p class="text-[11px] md:text-[12px] tracking-[0.15em] uppercase font-bold text-white">
            ⚠️ Atenção: <span class="text-white">Estoque com Preço de Fábrica Liberado.</span> Últimas unidades.
        </p>
    </div>

    <main>
        <section class="py-10 md:py-16 px-[5%] md:px-[8%] relative">
            <div class="max-w-[1200px] mx-auto w-full grid grid-cols-1 lg:grid-cols-[1.1fr_1fr] gap-10 items-center hero-grid">
                <div class="st-reveal delay-1 glass-card-product">
                    <img src="produtos page/cortador de grama toyama tlt42-19a.png" alt="Trator Cortador Toyama TLT42-19A" class="product-img-main">
                </div>
                <div>
                    <h1 class="title-bebas text-[clamp(40px,5vw,70px)] text-white mb-4 st-reveal delay-1">Trator Cortador Toyama <span class="text-[#D37B42]">19.5 HP</span></h1>
                    <ul class="flex flex-col gap-3 mb-8 st-reveal delay-2 text-white/80">
                        <li>✅ Motor 546cc de alta performance</li>
                        <li>✅ Plataforma 42" para corte rápido</li>
                        <li>✅ Transmissão Auto CVT</li>
                    </ul>
                    <a href="https://wa.me/5562981085787" target="_blank" class="btn-whatsapp-giant st-reveal delay-3">VER PREÇO DE FÁBRICA</a>
                </div>
            </div>
        </section>

        <section class="w-full h-[400px] border-t border-white/5 relative">
            <div class="absolute inset-0 z-0">
                <iframe 
                    src="https://maps.google.com/maps?q=Stillus%20Multim%C3%A1quinas,%20Av.%20Brasil%20Sul,%202168,%20An%C3%A1polis&t=&z=15&ie=UTF8&iwloc=&output=embed" 
                    style="width: 100%; height: 100%; border: none; filter: grayscale(100%) invert(90%) hue-rotate(180deg) brightness(1.2) contrast(0.9);" 
                    loading="lazy">
                </iframe>
            </div>
            <div class="absolute inset-0 bg-[#080808]/20 pointer-events-none z-10"></div>
        </section>
    </main>

    <footer class="py-10 text-center text-white/30 text-[11px]">
        © 2026 Stillus Multimáquinas.
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => document.querySelectorAll('.st-reveal').forEach(el => el.classList.add('loaded')), 100);
        });
    </script>
</body>
</html>
